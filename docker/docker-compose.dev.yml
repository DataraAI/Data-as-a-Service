version: '3.8'

services:
  # MongoDB - Document Database
  mongodb:
    image: mongo:7.0
    container_name: datara-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: datara_db
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - datara-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend - Flask API Server
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: development
    container_name: datara-backend
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 1
      MONGODB_URI: mongodb://admin:password@mongodb:27017/datara_db
    volumes:
      - ../backend:/app/backend
      - ../uploads:/app/backend/uploads
      - ../dataset:/app/backend/dataset
      - ../models:/app/backend/models
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - datara-network
    restart: unless-stopped

  # dashboard - React Development Server
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
      target: development
    container_name: datara-dashboard
    ports:
      - "5173:5173"
      - "8080:8080"
    environment:
      VITE_API_URL: http://localhost:5000
    volumes:
      - ../dashboard:/app/dashboard
      - /app/dashboard/node_modules
    depends_on:
      - backend
    networks:
      - datara-network
    restart: unless-stopped

