  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: datara-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - dashboard
      - backend
      - robotics
    networks:
      - datara-network
    restart: unless-stopped

  # Adminer - Database Web UI (optional, for development)
  adminer:
    image: adminer
    container_name: datara-adminer
    ports:
      - "8081:8080"
    depends_on:
      - mongodb
    networks:
      - datara-network
    restart: unless-stopped
    profiles:
      - tools

networks:
  datara-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local


