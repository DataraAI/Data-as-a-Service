version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile-backend
      target: production
    container_name: datara-backend
    expose:
      - "5151"
    environment:
      - FLASK_ENV=staging
      - PYTHONUNBUFFERED=1
      - SAAS_KEY_PATH=/run/secrets/azure_to_lambda
    volumes:
      - ../config:/app/config:ro
      - ./uploads:/app/backend/uploads
      - ./logs:/app/backend/logs
      - /home/roboteyeview/.ssh/azure_to_lambda:/run/secrets/azure_to_lambda:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5151/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile-dashboard
      target: production
    container_name: datara-dashboard
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: datara-nginx
    ports:
      - "5173:5173"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
      - backend
    restart: unless-stopped

volumes:
  uploads:
  logs:
